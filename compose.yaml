services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "${APP_PORT:-8000}:8000"
        environment:
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: champions_league
            DB_USERNAME: sail
            DB_PASSWORD: password
        depends_on:
            mysql:
                condition: service_healthy
        restart: unless-stopped

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: password
            MYSQL_DATABASE: champions_league
            MYSQL_USER: sail
            MYSQL_PASSWORD: password
        ports:
            - "${DB_PORT:-3306}:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
            interval: 5s
            timeout: 5s
            retries: 10
        restart: unless-stopped

volumes:
    mysql-data:
